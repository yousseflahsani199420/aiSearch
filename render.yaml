services:
  - type: web
    name: honest-search
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: arcee-ai/trinity-large-preview:free
      - key: APP_URL
        sync: false
